<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Contraseñas</title>
    <link rel="icon" type="image/png" href="Pics/DRM.png">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Mantenemos todo el CSS de la versión anterior */
        /* Variables CSS */
        :root {
            --primary-blue: #0a2e5c;
            --secondary-blue: #1a6bb3;
            --accent-green: #2dd4bf;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --text-light: #ffffff;
            --text-dark: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.1);
            --gradient-hero: linear-gradient(135deg, #0a2e5c 0%, #1a6bb3 50%, #2dd4bf 100%);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s ease;
            --border-radius: 12px;
        }

        /* Reset y estilos base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(45, 212, 191, 0.15) 0%, transparent 20%),
                radial-gradient(circle at 80% 20%, rgba(10, 46, 92, 0.15) 0%, transparent 20%);
            color: var(--text-light);
            font-family: 'Exo 2', Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        /* Patrón de fondo */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a6bb3' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
        }

        /* Contenedor principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Encabezado heroico */
        .hero-header {
            background: var(--gradient-hero);
            color: var(--text-light);
            padding: 40px 30px;
            margin-bottom: 40px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: slideInDown 0.8s ease-out;
        }

        .hero-header h1 {
            font-family: 'Bangers', cursive;
            font-size: 3.5rem;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .hero-header p {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Pantalla de autenticación */
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 40px 20px;
        }

        .auth-box {
            background: var(--gradient-card);
            background: linear-gradient(135deg, rgba(10, 46, 92, 0.9) 0%, rgba(45, 212, 191, 0.8) 100%);
            padding: 50px 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            max-width: 500px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .auth-box h2 {
            font-family: 'Orbitron', monospace;
            margin-bottom: 30px;
            color: var(--text-light);
            font-size: 1.8rem;
        }

        .password-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-family: 'Exo 2', Arial, sans-serif;
            transition: var(--transition);
        }

        .password-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.3);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-green);
            color: var(--dark-bg);
            border: none;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-btn:hover {
            background: #22c3aa;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .error-message {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        /* Ocultar la cuadrícula de contraseñas inicialmente */
        #passwordGrid {
            display: none;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            margin-bottom: 30px;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: var(--accent-green);
            color: var(--dark-bg);
            transform: translateX(-5px);
        }

        /* Contenedor de botones */
        .password-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        /* Estilos de botones */
        .password-btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100px;
            border-radius: var(--border-radius);
            font-family: 'Exo 2', Arial, sans-serif;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            padding: 15px 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.5s ease-out both;
        }

        .password-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: var(--transition);
        }

        .password-btn:hover::before {
            left: 100%;
        }

        .password-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .password-btn i {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .password-btn span {
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.2;
        }

        /* Colores específicos para cada servicio (igual que antes) */
        .DI { background: #5865F2; color: white; }
        .DI:hover { background: #4752c4; border: 2px solid #5865F2; }

        .CL { background: white; color: #C60606; }
        .CL:hover { background: #C60606; color: white; border: 2px solid white; }

        .GM { background: white; color: #1e1e1e; }
        .G { color: #4285F4; }
        .M { color: #DB4437; }
        .A { color: #F4B400; }
        .I { color: #4285F4; }
        .L { color: #0F9D58; }
        .GM:hover { background: #f1f1f1; border: 2px solid #DB4437; }

        /* ... (todos los demás colores de botones se mantienen igual) */

        /* Modal para mostrar credenciales */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--gradient-hero);
            width: 90%;
            max-width: 500px;
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            transform: translateY(-30px);
            transition: transform 0.4s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h3 i {
            color: var(--accent-green);
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-btn:hover {
            color: var(--accent-green);
            transform: rotate(90deg);
        }

        .credential-field {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-green);
        }

        .credential-field label {
            display: block;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-family: 'Orbitron', monospace;
        }

        .credential-field .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
            word-break: break-all;
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 5px;
            color: var(--text-light);
            padding: 6px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:hover {
            background: var(--accent-green);
            color: var(--dark-bg);
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-footer button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-family: 'Exo 2', Arial, sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .edit-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
        }

        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .delete-btn {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }

        .delete-btn:hover {
            background: rgba(220, 53, 69, 0.3);
        }

        /* Animaciones */
        @keyframes slideInDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-header h1 {
                font-size: 2.5rem;
            }
            
            .password-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }
            
            .auth-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Botón de regreso -->
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>

        <!-- Encabezado heroico -->
        <header class="hero-header">
            <h1>GESTOR SEGURO DE CONTRASEÑAS</h1>
            <p>Accede a tus credenciales cifradas con AES-256</p>
        </header>

        <!-- Pantalla de autenticación -->
        <div class="auth-screen" id="authScreen">
            <div class="auth-box">
                <h2><i class="fas fa-shield-alt"></i> Autenticación Requerida</h2>
                <p>Introduce tu clave maestra para descifrar las contraseñas:</p>
                <input type="password" 
                       class="password-input" 
                       id="masterPassword" 
                       placeholder="Clave maestra" 
                       autocomplete="off">
                <button class="auth-btn" id="authButton">
                    <i class="fas fa-unlock"></i> Descifrar Contraseñas
                </button>
                <div class="error-message" id="errorMessage">
                    Clave incorrecta. Intenta nuevamente.
                </div>
            </div>
        </div>

        <!-- Contenedor de botones de contraseñas (oculto inicialmente) -->
        <div class="password-grid" id="passwordGrid">
            <!-- Los botones se generarán dinámicamente con JavaScript -->
        </div>

        <!-- Modal para mostrar credenciales -->
        <div class="modal-overlay" id="passwordModal">
            <div class="modal">
                <div class="modal-header">
                    <h3><i class="fas fa-key"></i> <span id="modalService">Servicio</span></h3>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                
                <div class="credential-field">
                    <label><i class="fas fa-user"></i> USUARIO / CORREO</label>
                    <div class="value">
                        <span id="modalUsername">usuario@ejemplo.com</span>
                        <button class="copy-btn" data-target="username">
                            <i class="far fa-copy"></i> Copiar
                        </button>
                    </div>
                </div>
                
                <div class="credential-field">
                    <label><i class="fas fa-lock"></i> CONTRASEÑA</label>
                    <div class="value">
                        <span id="modalPassword">••••••••••</span>
                        <button class="copy-btn" data-target="password">
                            <i class="far fa-copy"></i> Copiar
                        </button>
                    </div>
                </div>
                
                <div class="credential-field" id="additionalInfo">
                    <label><i class="fas fa-info-circle"></i> INFORMACIÓN ADICIONAL</label>
                    <div class="value">
                        <span id="modalAdditional">Sin información adicional</span>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button class="delete-btn" id="closeModalBtn">
                        <i class="fas fa-times"></i> Cerrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CryptoJS para cifrado/descifrado -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Nuestro script principal -->
    <script src="PS.js"></script>
</body>
</html>
